# Publish Docker image
# Copy from new-api 
# https://github.com/QuantumNous/new-api/blob/main/.github/workflows/docker-image-arm64.yml

name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

jobs:
  validate_rust_workspace:
    name: Validate Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace tests
        run: cargo test --workspace --locked

  build_single_arch:
    name: Build & push full product image (${{ matrix.arch }}) [native]
    needs: [validate_rust_workspace]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve tag & write VERSION
        run: |
          git fetch --tags --force --depth=1
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "$TAG" > internal/build/VERSION
          echo "Building tag: $TAG for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            looplj/axonhub

      - name: Build & push single-arch (to both registries)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            looplj/axonhub:${{ env.TAG }}-${{ matrix.arch }}
            looplj/axonhub:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create full product multi-arch manifests (Docker Hub)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Extract tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - version)
        run: |
          docker buildx imagetools create \
            -t looplj/axonhub:${TAG} \
            looplj/axonhub:${TAG}-amd64 \
            looplj/axonhub:${TAG}-arm64

      - name: Create & push manifest (Docker Hub - latest)
        run: |
          docker buildx imagetools create \
            -t looplj/axonhub:latest \
            looplj/axonhub:latest-amd64 \
            looplj/axonhub:latest-arm64

  build_rust_single_arch:
    name: Build & push Rust migration-slice image (${{ matrix.arch }}) [native Alpine]
    needs: [validate_rust_workspace]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve tag, write VERSION, and set build metadata
        run: |
          git fetch --tags --force --depth=1
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "RUST_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/axonhub" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "$TAG" > internal/build/VERSION
          echo "Building Rust migration-slice tag: $TAG for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: rust_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.RUST_IMAGE }}

      - name: Build & push Rust single-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.RUST_IMAGE }}:rust-${{ env.TAG }}-${{ matrix.arch }}
            ${{ env.RUST_IMAGE }}:rust-latest-${{ matrix.arch }}
          labels: ${{ steps.rust_meta.outputs.labels }}
          build-args: |
            AXONHUB_BUILD_COMMIT=${{ github.sha }}
            AXONHUB_BUILD_TIME=${{ env.BUILD_TIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_rust_manifests:
    name: Create Rust migration-slice multi-arch manifests (GHCR)
    needs: [build_rust_single_arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      packages: write
      contents: read

    steps:
      - name: Extract tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "RUST_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/axonhub" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - Rust version)
        run: |
          docker buildx imagetools create \
            -t ${RUST_IMAGE}:rust-${TAG} \
            ${RUST_IMAGE}:rust-${TAG}-amd64 \
            ${RUST_IMAGE}:rust-${TAG}-arm64

      - name: Create & push manifest (GHCR - Rust latest)
        run: |
          docker buildx imagetools create \
            -t ${RUST_IMAGE}:rust-latest \
            ${RUST_IMAGE}:rust-latest-amd64 \
            ${RUST_IMAGE}:rust-latest-arm64
