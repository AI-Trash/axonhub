name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

jobs:
  validate_rust_workspace:
    name: Validate Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace tests
        run: cargo test --workspace --locked

  build_single_arch:
    name: Build & push canonical Rust image (${{ matrix.arch }}) [native]
    needs: [validate_rust_workspace]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve tag, write VERSION, and set build metadata
        run: |
          git fetch --tags --force --depth=1
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/axonhub" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "$TAG" > internal/build/VERSION
          echo "Building canonical Rust tag: $TAG for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            looplj/axonhub
            ${{ env.GHCR_IMAGE }}

      - name: Build & push single-arch canonical Rust image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            looplj/axonhub:${{ env.TAG }}-${{ matrix.arch }}
            looplj/axonhub:latest-${{ matrix.arch }}
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}
            ${{ env.GHCR_IMAGE }}:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AXONHUB_BUILD_COMMIT=${{ github.sha }}
            AXONHUB_BUILD_TIME=${{ env.BUILD_TIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create canonical Rust multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      packages: write
      contents: read

    steps:
      - name: Extract tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/axonhub" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - version)
        run: |
          docker buildx imagetools create \
            -t looplj/axonhub:${TAG} \
            looplj/axonhub:${TAG}-amd64 \
            looplj/axonhub:${TAG}-arm64

      - name: Create & push manifest (Docker Hub - latest)
        run: |
          docker buildx imagetools create \
            -t looplj/axonhub:latest \
            looplj/axonhub:latest-amd64 \
            looplj/axonhub:latest-arm64

      - name: Create & push manifest (GHCR - version)
        run: |
          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:${TAG} \
            ${GHCR_IMAGE}:${TAG}-amd64 \
            ${GHCR_IMAGE}:${TAG}-arm64

      - name: Create & push manifest (GHCR - latest)
        run: |
          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:latest \
            ${GHCR_IMAGE}:latest-amd64 \
            ${GHCR_IMAGE}:latest-arm64
