name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  validate_rust_workspace:
    name: Validate Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace tests
        run: cargo test --workspace --locked

  canonical_rust_release_assets:
    name: Publish canonical Rust release assets (${{ matrix.asset_platform }})
    needs: validate_rust_workspace
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_platform: linux_amd64
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_platform: linux_arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_platform: darwin_amd64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_platform: darwin_arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_platform: windows_amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag & write VERSION
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "$TAG" > internal/build/VERSION

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set Rust build metadata
        shell: bash
        run: |
          echo "AXONHUB_BUILD_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "AXONHUB_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "AXONHUB_BUILD_RUST_VERSION=$(rustc --version)" >> "$GITHUB_ENV"

      - name: Upload canonical Rust asset
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: axonhub
          manifest-path: apps/axonhub-server/Cargo.toml
          target: ${{ matrix.target }}
          archive: axonhub_${{ matrix.asset_platform }}
          locked: true
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
