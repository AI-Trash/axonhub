name: Publish GHCR image

on:
  push:
    branches:
      - master
    tags:
      - '**'

permissions:
  packages: write
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_rust_workspace:
    name: Validate Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace tests
        run: cargo test --workspace --locked

  build_and_push_ghcr:
    name: Build & push canonical Rust image (GHCR)
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          RAW_IMAGE_NAME="${GHCR_IMAGE_NAME:-${REPO_NAME}}"
          IMAGE_NAME_LC=$(echo "${RAW_IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME_LC="${IMAGE_NAME_LC#ghcr.io/}"

          if [[ "${IMAGE_NAME_LC}" == */* ]]; then
            GHCR_IMAGE="ghcr.io/${IMAGE_NAME_LC}"
          else
            GHCR_IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME_LC}"
          fi

          echo "GHCR_IMAGE=${GHCR_IMAGE}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_VALUE="${GITHUB_REF#refs/tags/}"
          else
            VERSION_VALUE="dev-${GITHUB_SHA::12}"
          fi

          echo "$VERSION_VALUE" > internal/build/VERSION
          echo "Build version: $VERSION_VALUE"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=tag

      - name: Build & push multi-arch canonical Rust image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AXONHUB_BUILD_COMMIT=${{ github.sha }}
            AXONHUB_BUILD_TIME=${{ env.BUILD_TIME }}
            AXONHUB_BUILD_RUST_VERSION=stable
          cache-from: |
            type=gha,scope=axonhub-ghcr
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=axonhub-ghcr
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          provenance: false
          sbom: false
