# Copy from https://github.com/spf13/cobra
# https://github.com/spf13/cobra/blob/master/LICENSE.txt
name: Test
on:
  push:
    branches:
      - "unstable"
      - "release/**"
  pull_request:
    branches:
      - "unstable"
      - "release/**"
env:
  GO111MODULE: on
jobs:
  rust_workspace:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test Rust workspace
        run: cargo test --workspace --locked

  go_oracle_reference:
    name: Go oracle/reference tests
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          stable: true

      - name: Test Go oracle/reference backend
        run: make test-backend-all

  full_parity_regression:
    name: Full parity regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          stable: true

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run consolidated parity regression wave
        run: python3 ".sisyphus/tools/task16_full_regression.py" run

      - name: Verify parity sentinel
        run: python3 ".sisyphus/tools/task16_full_regression.py" sentinel

      - name: Run post-cutover guardrails
        run: python3 ".sisyphus/tools/task18_guardrails.py" run

      - name: Generate parity evidence index
        run: python3 ".sisyphus/tools/task18_guardrails.py" evidence-index
