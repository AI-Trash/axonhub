services:
  axonhub:
    image: looplj/axonhub:latest
    container_name: axonhub-app
    ports:
      - "8090:8090"
    volumes:
      - axonhub-data:/app
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  axonhub-data:
